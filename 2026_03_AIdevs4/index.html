<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Jarek Pawelczyk @ AI Devs 4</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 390px;
      height: 844px;
      overflow: hidden;
      position: relative;
      background: #0a0806;
    }

    /* ── BACKGROUND ─────────────────────────────────────────── */
    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 420px 420px at 195px 410px, rgba(40,180,40,0.18) 0%, transparent 68%),
        radial-gradient(ellipse 280px 280px at 195px 410px, rgba(200,120,0,0.12) 0%, transparent 62%),
        linear-gradient(180deg, #1a1008 0%, #0d0a04 25%, #0a0806 55%, #0c0904 80%, #080604 100%);
    }

    /* ── EMBERS (floating sparks) ─────────────────────────── */
    .ember {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
      animation: emberFloat var(--ef) ease-in-out infinite,
                 emberGlow  var(--ef2) ease-in-out infinite;
    }
    .ember.green {
      background: radial-gradient(circle, rgba(57,255,20,0.95) 0%, rgba(0,200,40,0.5) 45%, transparent 80%);
    }
    .ember.orange {
      background: radial-gradient(circle, rgba(255,160,20,0.95) 0%, rgba(255,100,0,0.5) 45%, transparent 80%);
    }
    @keyframes emberFloat {
      0%   { transform: translate(0px, 0px); }
      25%  { transform: translate(var(--x1), var(--y1)); }
      50%  { transform: translate(var(--x2), var(--y2)); }
      75%  { transform: translate(var(--x3), var(--y3)); }
      100% { transform: translate(0px, 0px); }
    }
    @keyframes emberGlow {
      0%, 100% { opacity: 0.05; }
      50%       { opacity: 0.80; }
    }

    /* ── CARD ───────────────────────────────────────────────── */
    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -58%);
      width: 288px;
      background: rgba(10, 8, 4, 0.78);
      backdrop-filter: blur(22px) saturate(1.8);
      -webkit-backdrop-filter: blur(22px) saturate(1.8);
      border: 1px solid rgba(57,255,20,0.20);
      border-radius: 28px;
      padding: 18px 20px 16px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(57,255,20,0.08),
        0 12px 70px rgba(0,0,0,0.80),
        0 0 50px rgba(57,255,20,0.06),
        inset 0 1px 0 rgba(57,255,20,0.12);
      z-index: 10;
    }
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 32px; height: 32px;
      border-color: rgba(57,255,20,0.40);
      border-style: solid;
    }
    .card::before { top:10px; left:10px; border-width:2px 0 0 2px; border-radius:6px 0 0 0; }
    .card::after  { bottom:10px; right:10px; border-width:0 2px 2px 0; border-radius:0 0 6px 0; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(57,255,20,0.06);
      border: 1px solid rgba(57,255,20,0.22);
      border-radius: 20px;
      padding: 4px 11px 4px 8px;
      margin-bottom: 11px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      background: #39ff14;
      border-radius: 50%;
      animation: bdPulse 2.2s ease-in-out infinite;
    }
    @keyframes bdPulse {
      0%,100% { box-shadow: 0 0 4px #39ff14; }
      50%      { box-shadow: 0 0 10px #39ff14, 0 0 22px rgba(57,255,20,0.4); }
    }
    .badge-text {
      font-size: 8.5px; font-weight: 600;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: rgba(255,255,255,0.68);
      font-family: 'Raleway', sans-serif;
    }

    .name {
      font-family: 'Cinzel', serif;
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.06em; color: #fff;
      text-shadow: 0 0 22px rgba(57,255,20,0.45);
      margin-bottom: 3px;
    }
    .role {
      font-family: 'Raleway', sans-serif;
      font-size: 8.5px; font-weight: 300;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(57,255,20,0.50);
      margin-bottom: 13px;
    }

    .qr-wrap {
      position: relative;
      display: inline-block;
      padding: 9px;
      border-radius: 14px;
      background: rgba(246,251,240,0.97);
      box-shadow:
        0 0 0 1px rgba(57,255,20,0.30),
        0 0 28px rgba(57,255,20,0.18),
        0 5px 22px rgba(0,0,0,0.5);
      margin-bottom: 13px;
    }
    .qr-glow {
      position: absolute;
      inset: -5px;
      border-radius: 18px;
      pointer-events: none;
      animation: qrg 3.5s ease-in-out infinite alternate;
    }
    @keyframes qrg {
      from { box-shadow: 0 0 14px 3px rgba(57,255,20,0.10); }
      to   { box-shadow: 0 0 32px 9px rgba(57,255,20,0.28); }
    }
    #qrcode canvas, #qrcode img { display:block; border-radius:5px; }

    .scan-label {
      font-family: 'Raleway', sans-serif;
      font-size: 7.5px; letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(57,255,20,0.40);
      margin-bottom: 8px;
    }
    .linkedin-handle {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: 'Raleway', sans-serif;
      font-size: 10.5px; font-weight: 600;
      color: rgba(220,255,220,0.9);
      letter-spacing: 0.04em;
      padding: 5px 12px;
      border-radius: 20px;
      background: rgba(20,80,10,0.35);
      border: 1px solid rgba(57,255,20,0.25);
    }
    .divider {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(57,255,20,0.38), transparent);
      margin: 11px auto;
    }
    .event-label {
      font-family: 'Raleway', sans-serif;
      font-size: 7px; letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(57,255,20,0.38);
    }

    /* ── FOREGROUND ─────────────────────────────────────────── */
    .foreground {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 280px;
      pointer-events: none;
      z-index: 7;
    }
  </style>
</head>

    el.className = 'ember ' + o.c;
    const dur = 5 + Math.random()*8, dur2 = 3 + Math.random()*5;
    el.style.cssText = `
      top:${o.t}%;left:${o.l}%;
      width:${o.s}px;height:${o.s}px;
      --ef:${dur.toFixed(1)}s;--ef2:${dur2.toFixed(1)}s;
