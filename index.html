<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Jarosław Pawełczyk — Google Tech Talk</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:ital,wght@0,300;0,400;0,600;1,300&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 390px;
      height: 844px;
      overflow: hidden;
      position: relative;
      font-family: 'Raleway', sans-serif;
      background: #0a0f1e;
    }

    /* ── SKY ───────────────────────────────────────────────── */
    .sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        #0a0f1e 0%,
        #0d1b3e 12%,
        #1a2f6b 28%,
        #2e5fa3 44%,
        #5b8ec4 56%,
        #a2c4dd 66%,
        #f0cfa0 78%,
        #e8a96a 88%,
        #c97940 95%,
        #9b4f22 100%
      );
      animation: skyShift 20s ease-in-out infinite alternate;
    }
    @keyframes skyShift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      100% { filter: hue-rotate(15deg) brightness(1.05); }
    }

    /* ── STARS ─────────────────────────────────────────────── */
    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: var(--a1, 0.2); transform: scale(1); }
      to   { opacity: var(--a2, 0.9); transform: scale(1.5); }
    }

    /* ── CLOUDS ────────────────────────────────────────────── */
    .clouds {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .cloud {
      position: absolute;
      border-radius: 50px;
      filter: blur(2px);
      opacity: 0.55;
      animation: drift linear infinite;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }
    @keyframes drift {
      from { transform: translateX(-300px); }
      to   { transform: translateX(700px); }
    }

    /* ── FLOATING ISLAND ───────────────────────────────────── */
    .island-wrap {
      position: absolute;
      bottom: 155px;
      left: 50%;
      transform: translateX(-50%);
      width: 340px;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateX(-50%) translateY(0px); }
      50%       { transform: translateX(-50%) translateY(-10px); }
    }

    /* ── TREES / FOREGROUND ────────────────────────────────── */
    .foreground {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 165px;
      pointer-events: none;
    }

    /* ── CARD ──────────────────────────────────────────────── */
    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -53%);
      width: 294px;
      background: rgba(10, 20, 50, 0.55);
      backdrop-filter: blur(18px) saturate(1.6);
      -webkit-backdrop-filter: blur(18px) saturate(1.6);
      border: 1px solid rgba(160, 200, 255, 0.25);
      border-radius: 28px;
      padding: 20px 22px 18px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(80, 140, 255, 0.1),
        0 8px 48px rgba(0, 0, 0, 0.55),
        0 0 80px rgba(60, 120, 255, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      z-index: 10;
    }

    /* circuit corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 38px;
      height: 38px;
      border-color: rgba(100, 180, 255, 0.45);
      border-style: solid;
    }
    .card::before {
      top: 10px; left: 10px;
      border-width: 2px 0 0 2px;
      border-radius: 6px 0 0 0;
    }
    .card::after {
      bottom: 10px; right: 10px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 6px 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 4px 11px 4px 8px;
      margin-bottom: 12px;
    }
    .badge-dot {
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 6px #4ade80;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 4px #4ade80; }
      50%       { box-shadow: 0 0 10px #4ade80, 0 0 20px #4ade8060; }
    }
    .badge-text {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }

    .name {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #fff;
      line-height: 1.3;
      text-shadow: 0 0 20px rgba(120, 180, 255, 0.6);
      margin-bottom: 3px;
    }
    .role {
      font-size: 9.5px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(180, 210, 255, 0.65);
      margin-bottom: 14px;
    }

    /* ── QR ────────────────────────────────────────────────── */
    .qr-wrap {
      position: relative;
      display: inline-block;
      padding: 10px;
      border-radius: 16px;
      background: rgba(255,255,255,0.97);
      box-shadow:
        0 0 0 1px rgba(100, 180, 255, 0.3),
        0 0 24px rgba(80, 140, 255, 0.25),
        0 4px 20px rgba(0,0,0,0.4);
      margin-bottom: 14px;
    }
    .qr-glow {
      position: absolute;
      inset: -6px;
      border-radius: 20px;
      background: transparent;
      box-shadow: 0 0 20px 4px rgba(80, 160, 255, 0.2);
      animation: qrGlow 3s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes qrGlow {
      from { box-shadow: 0 0 16px 2px rgba(80, 160, 255, 0.15); }
      to   { box-shadow: 0 0 32px 8px rgba(120, 200, 255, 0.35); }
    }
    #qrcode canvas, #qrcode img { display: block; border-radius: 6px; }

    .scan-label {
      font-size: 8.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(160, 200, 255, 0.6);
      margin-bottom: 8px;
    }

    .linkedin-handle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(200, 225, 255, 0.9);
      letter-spacing: 0.04em;
      padding: 5px 12px;
      border-radius: 20px;
      background: rgba(10, 100, 200, 0.3);
      border: 1px solid rgba(80, 160, 255, 0.3);
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(120, 180, 255, 0.4), transparent);
      margin: 12px auto;
    }

    .event-label {
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 200, 120, 0.7);
    }

    /* ── FIREFLIES ─────────────────────────────────────────── */
    .firefly {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, #ffe066 0%, #ffb30080 60%, transparent 100%);
      animation: flyAround var(--fd, 8s) ease-in-out infinite alternate, fadeFly var(--fd2, 4s) ease-in-out infinite;
      pointer-events: none;
      z-index: 5;
    }
    @keyframes flyAround {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(var(--fx1, 30px), var(--fy1, -20px)); }
      50%  { transform: translate(var(--fx2, -15px), var(--fy2, 25px)); }
      75%  { transform: translate(var(--fx3, 20px), var(--fy3, 10px)); }
      100% { transform: translate(var(--fx4, -25px), var(--fy4, -15px)); }
    }
    @keyframes fadeFly {
      0%, 100% { opacity: 0.1; }
      50%       { opacity: 0.85; }
    }

    /* ── CIRCUIT LINES ─────────────────────────────────────── */
    .circuit-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.06;
      z-index: 1;
    }
  </style>
</head>

<script>
  // ── QR CODE ─────────────────────────────────────────────────
  new QRCode(document.getElementById('qrcode'), {
    text: 'https://www.linkedin.com/in/jaroslawpawelczyk/',

  // ── STARS ───────────────────────────────────────────────────
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random() * 55}%;
      left:${Math.random() * 100}%;
      --d:${2 + Math.random() * 4}s;

    starsEl.appendChild(s);
  }

  // ── CLOUDS ──────────────────────────────────────────────────
  const cloudsEl = document.getElementById('clouds');
  const cloudData = [
    { top: 8,  w: 90,  h: 22, dur: 42, delay: 0,   color: 'rgba(255,230,200,0.55)' },
    { top: 14, w: 120, h: 28, dur: 60, delay: -18,  color: 'rgba(255,215,175,0.45)' },

    { top: 28, w: 100, h: 24, dur: 50, delay: -30,  color: 'rgba(200,220,255,0.35)' },
    { top: 34, w: 80,  h: 20, dur: 44, delay: -6,   color: 'rgba(200,220,255,0.3)'  },

    const el = document.createElement('div');
    el.className = 'cloud';
    el.style.cssText = `
      top:${c.top}%; width:${c.w}px; height:${c.h}px;
      background:${c.color};
      animation-duration:${c.dur}s;
      animation-delay:${c.delay}s;
    `;
    el.style.setProperty('--before-w', `${c.w * 0.55}px`);
    el.style.setProperty('--before-h', `${c.h * 1.4}px`);
    cloudsEl.appendChild(el);
  });

  // ── FIREFLIES ───────────────────────────────────────────────
  const fireflyPositions = [
    { top: 38, left: 12,  size: 5 },
    { top: 44, left: 82,  size: 4 },
    { top: 28, left: 24,  size: 3 },
    { top: 52, left: 68,  size: 4 },
    { top: 35, left: 55,  size: 3 },
    { top: 60, left: 18,  size: 5 },
    { top: 48, left: 90,  size: 3 },
    { top: 42, left: 40,  size: 4 },
    { top: 30, left: 72,  size: 3 },
    { top: 55, left: 8,   size: 4 },
    { top: 25, left: 88,  size: 3 },
    { top: 67, left: 78,  size: 4 },
  ];
  fireflyPositions.forEach((f, i) => {
    const el = document.createElement('div');
    el.className = 'firefly';
    const dur = 5 + Math.random() * 8;
    const dur2 = 2 + Math.random() * 4;
    el.style.cssText = `
      top:${f.top}%; left:${f.left}%;
      width:${f.size}px; height:${f.size}px;
      --fd:${dur}s; --fd2:${dur2}s;
      --fx1:${rnd()}px; --fy1:${rnd()}px;
      --fx2:${rnd()}px; --fy2:${rnd()}px;
      --fx3:${rnd()}px; --fy3:${rnd()}px;
      --fx4:${rnd()}px; --fy4:${rnd()}px;
      animation-delay:${Math.random() * 6}s, ${Math.random() * 4}s;
    `;
    document.body.appendChild(el);
  });

  function rnd() { return (Math.random() - 0.5) * 70; }
</script>
</body>
</html>
