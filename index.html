<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarek Pawelczyk — Business Cards</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #060e20;
      color: #e8e8f0;
      font-family: 'Raleway', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 50% 60%, rgba(0,100,220,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 50% 60%, rgba(200,0,120,0.10) 0%, transparent 65%),
        linear-gradient(180deg, #040c1c 0%, #071428 40%, #081630 70%, #050e1a 100%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 60px;
    }

    .name {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #c8d8ff 0%, #8ab0ff 40%, #c060d0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(160,180,255,0.55);
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(100,150,255,0.5), transparent);
      margin: 20px auto 0;
    }

    /* Grid */
    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 900px;
    }

    /* Card */
    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(100,150,255,0.15);
      border-radius: 16px;
      padding: 32px 28px;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 200px 120px at 50% 0%, rgba(80,140,255,0.12) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(100,150,255,0.4);
      box-shadow: 0 8px 40px rgba(0,80,200,0.25), 0 0 0 1px rgba(100,150,255,0.1);
    }

    .card:hover::before { opacity: 1; }

    .card-date {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(130,160,255,0.6);
      margin-bottom: 10px;
    }

    .card-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #c8d8ff;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 0.82rem;
      color: rgba(180,190,220,0.55);
      line-height: 1.6;
    }

    .card-arrow {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: rgba(100,150,255,0.4);
      transition: color 0.25s, transform 0.25s;
    }

    .card:hover .card-arrow {
      color: rgba(140,180,255,0.9);
      transform: translateY(-50%) translateX(4px);
    }

    /* Loading / error states */
    .status {
      position: relative;
      z-index: 1;
      color: rgba(160,180,220,0.5);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    .empty {
      position: relative;
      z-index: 1;
      text-align: center;
      color: rgba(160,180,220,0.35);
      font-size: 0.85rem;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <div class="name">Jarek Pawelczyk</div>
    <div class="subtitle">Digital Business Cards</div>
    <div class="divider"></div>
  </header>

  <div class="grid" id="grid">
    <span class="status">Loading…</span>
  </div>

  <script>
    async function loadCards() {
      const grid = document.getElementById('grid');

      try {
        const res = await fetch('cards.json');
        if (!res.ok) throw new Error('not found');
        const cards = await res.json();

        if (!cards.length) {
          grid.innerHTML = '<p class="empty">No cards yet.</p>';
          return;
        }

        grid.innerHTML = cards.map(c => `
          <a class="card" href="${c.folder}/index.html">
            <div class="card-date">${c.date || ''}</div>
            <div class="card-title">${c.title}</div>
            <div class="card-desc">${c.description || ''}</div>
            <span class="card-arrow">›</span>
          </a>
        `).join('');
      } catch (e) {
        grid.innerHTML = '<p class="empty">Could not load cards.json</p>';
      }
    }

    loadCards();
  </script>
</body>
</html>
