<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Jarek Pawelczyk @ Google TechTank</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 390px;
      height: 844px;
      overflow: hidden;
      position: relative;
      background: #060e20;
    }

    /* ── BACKGROUND ─────────────────────────────────────────── */
    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 420px 420px at 195px 410px, rgba(0,100,220,0.38) 0%, transparent 68%),
        radial-gradient(ellipse 280px 280px at 195px 410px, rgba(200,0,120,0.18) 0%, transparent 62%),
        linear-gradient(180deg, #040c1c 0%, #071428 25%, #081630 55%, #071220 80%, #050e1a 100%);
    }

    /* ── SPIRIT ORBS (Ghibli magic) ─────────────────────────── */
    .spirit {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,224,100,0.95) 0%, rgba(255,170,0,0.5) 45%, transparent 80%);
      pointer-events: none;
      z-index: 5;
      animation: spiritFloat var(--sf) ease-in-out infinite,
                 spiritFade  var(--sf2) ease-in-out infinite;
    }
    @keyframes spiritFloat {
      0%   { transform: translate(0px, 0px); }
      25%  { transform: translate(var(--x1), var(--y1)); }
      50%  { transform: translate(var(--x2), var(--y2)); }
      75%  { transform: translate(var(--x3), var(--y3)); }
      100% { transform: translate(0px, 0px); }
    }
    @keyframes spiritFade {
      0%, 100% { opacity: 0.04; }
      50%       { opacity: 0.75; }
    }

    /* ── CARD ───────────────────────────────────────────────── */
    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -53%);
      width: 288px;
      background: rgba(1, 6, 22, 0.68);
      backdrop-filter: blur(22px) saturate(1.9);
      -webkit-backdrop-filter: blur(22px) saturate(1.9);
      border: 1px solid rgba(0, 200, 255, 0.18);
      border-radius: 28px;
      padding: 18px 20px 16px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(0,140,255,0.07),
        0 12px 70px rgba(0,0,0,0.75),
        0 0 50px rgba(0,100,255,0.07),
        inset 0 1px 0 rgba(0,220,255,0.1);
      z-index: 10;
    }
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 32px; height: 32px;
      border-color: rgba(0, 210, 255, 0.38);
      border-style: solid;
    }
    .card::before { top:10px; left:10px; border-width:2px 0 0 2px; border-radius:6px 0 0 0; }
    .card::after  { bottom:10px; right:10px; border-width:0 2px 2px 0; border-radius:0 0 6px 0; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,200,255,0.2);
      border-radius: 20px;
      padding: 4px 11px 4px 8px;
      margin-bottom: 11px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      background: #00e5ff;
      border-radius: 50%;
      animation: bdPulse 2.2s ease-in-out infinite;
    }
    @keyframes bdPulse {
      0%,100% { box-shadow: 0 0 4px #00e5ff; }
      50%      { box-shadow: 0 0 10px #00e5ff, 0 0 22px rgba(0,229,255,0.4); }
    }
    .badge-text {
      font-size: 8.5px; font-weight: 600;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: rgba(255,255,255,0.68);
      font-family: 'Raleway', sans-serif;
    }

    .name {
      font-family: 'Cinzel', serif;
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.06em; color: #fff;
      text-shadow: 0 0 22px rgba(0,210,255,0.55);
      margin-bottom: 3px;
    }
    .role {
      font-family: 'Raleway', sans-serif;
      font-size: 8.5px; font-weight: 300;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(0,210,255,0.52);
      margin-bottom: 13px;
    }

    .qr-wrap {
      position: relative;
      display: inline-block;
      padding: 9px;
      border-radius: 14px;
      background: rgba(246,251,255,0.97);
      box-shadow:
        0 0 0 1px rgba(0,180,255,0.28),
        0 0 28px rgba(0,150,255,0.22),
        0 5px 22px rgba(0,0,0,0.5);
      margin-bottom: 13px;
    }
    .qr-glow {
      position: absolute;
      inset: -5px;
      border-radius: 18px;
      pointer-events: none;
      animation: qrg 3.5s ease-in-out infinite alternate;
    }
    @keyframes qrg {
      from { box-shadow: 0 0 14px 3px rgba(0,180,255,0.13); }
      to   { box-shadow: 0 0 32px 9px rgba(0,210,255,0.32); }
    }
    #qrcode canvas, #qrcode img { display:block; border-radius:5px; }

    .scan-label {
      font-family: 'Raleway', sans-serif;
      font-size: 7.5px; letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(0,200,255,0.45);
      margin-bottom: 8px;
    }
    .linkedin-handle {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: 'Raleway', sans-serif;
      font-size: 10.5px; font-weight: 600;
      color: rgba(200,235,255,0.9);
      letter-spacing: 0.04em;
      padding: 5px 12px;
      border-radius: 20px;
      background: rgba(0,70,150,0.32);
      border: 1px solid rgba(0,150,255,0.28);
    }
    .divider {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,200,255,0.38), transparent);
      margin: 11px auto;
    }
    .event-label {
      font-family: 'Raleway', sans-serif;
      font-size: 7px; letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(0,210,255,0.42);
    }

    /* ── FOREGROUND ─────────────────────────────────────────── */
    .foreground {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 185px;
      pointer-events: none;
      z-index: 7;
    }
  </style>
</head>
